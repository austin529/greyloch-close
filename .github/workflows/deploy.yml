name: Deploy

# Auto-deploy on push to main. Alternative to Cloudflare's native Git
# integration — use ONE of the two, not both.
#
# Required GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   - a token with "Edit Workers" + D1 edit permissions
#   CLOUDFLARE_ACCOUNT_ID  - your Cloudflare account id
#
# Prereqs (one-time): the D1 database exists and its database_id is set in
# wrangler.jsonc (see DEPLOY.md §1).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci

      # Apply any new D1 migrations to production (idempotent — only unapplied
      # ones run). Ships schema/seed/history changes alongside code.
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply greyloch-close --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Builds the SPA (via the build hook in wrangler.jsonc) and deploys.
      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
